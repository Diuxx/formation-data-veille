# /etc/nginx/sites-available/api.nicoblog.dev

# Connexions persistantes vers Node (perf)
upstream api_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP -> HTTPS (+ dossier challenge pour Certbot)
server {
    listen 80;
    listen [::]:80;
    server_name api.nicoblog.dev;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.nicoblog.dev;

    # Logs (optionnel mais pratique)
    access_log /var/log/nginx/api.nicoblog.dev.access.log;
    error_log  /var/log/nginx/api.nicoblog.dev.error.log;

    # Si tu upload (images, fichiers, etc.)
    client_max_body_size 20m;

    # Reverse proxy vers Node
    location / {
        proxy_pass http://api_node;

        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers proxy essentiels
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts raisonnables
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffers (OK pour JSON “normal”). Si SSE/streaming => mettre off (voir note plus bas)
        proxy_buffering on;
    }

    # Petit endpoint health (optionnel)
    location = /health {
        proxy_pass http://api_node/health;
        access_log off;
    }
}